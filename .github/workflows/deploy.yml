name: Deploy to GitHub Pages

on:
  # 每次推送 main 分支时自动部署
  push:
    branches: [main]
  # 允许在 GitHub 网页手动触发
  workflow_dispatch:

# 授予写入 GitHub Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只允许一个部署任务运行，避免并发冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 构建 ─────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site (vpn-usa only)
        run: npm run build
        env:
          ENABLED_SITES: vpn-usa

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 部署 ─────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
